services:
  api:
    build: .
    container_name: ai-document-pipeline
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - RUN_ENV=docker
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: ai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped